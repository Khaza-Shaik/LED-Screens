openapi: 3.0.0
info:
  title: Jaan Entertainment API
  description: API documentation for the Jaan Entertainment ad-network platform.
  version: 1.0.0
servers:
  - url: http://localhost:5000
    description: Local development server

paths:
  /api/billboards:
    get:
      summary: Get all billboards
      description: Returns a list of all billboard assets currently in the system.
      responses:
        '200':
          description: A list of billboards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Billboard'
    post:
      summary: Create a new billboard
      description: Provisions a new billboard asset in the system.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BillboardInput'
      responses:
        '201':
          description: Billboard created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Billboard'
        '400':
          description: Invalid input

  /api/billboards/{id}:
    delete:
      summary: Delete a billboard
      description: Removes a billboard asset from the system by its ID.
      parameters:
        - name: id
          in: path
          required: true
          description: ID of the billboard to delete
          schema:
            type: string
      responses:
        '204':
          description: Billboard deleted successfully
        '404':
          description: Billboard not found

  /api/login:
    post:
      summary: User login
      description: Authenticates a user and returns a session token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
        '401':
          description: Unauthorized

  /api/register:
    post:
      summary: User registration
      description: Creates a new user account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '201':
          description: User registered successfully
        '400':
          description: Registration failed

  /api/forgot-password:
    post:
      summary: Forgot password
      description: Initiates the password recovery process.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Recovery email sent

components:
  schemas:
    Billboard:
      type: object
      properties:
        id:
          oneOf:
            - type: string
            - type: integer
        location:
          type: string
        status:
          type: string
          enum: [Active, High Demand, Inactive]
        price:
          type: string
          example: "₹5,000/hr"
        impressions:
          type: string
          example: "1.2M"
        lat:
          type: number
          format: float
        lng:
          type: number
          format: float
        lastUpdated:
          type: string
          format: date-time

    BillboardInput:
      type: object
      required:
        - location
        - price
        - impressions
        - lat
        - lng
      properties:
        location:
          type: string
        price:
          type: string
        impressions:
          type: string
        lat:
          type: number
          format: float
        lng:
          type: number
          format: float
